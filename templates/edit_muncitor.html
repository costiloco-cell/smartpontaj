{% extends "base.html" %}

{% block content %}

<h2>Editare muncitor</h2>

<form method="POST">

<label>Nume</label>
<br>
<input name="nume" value="{{ muncitor.nume }}" required>

<br><br>

<label>Tarif oră</label>
<br>
<input name="tarif" value="{{ muncitor.tarif_ora }}" required>

<br><br>

<button class="btn btn-success">Salvează</button>

<a href="{{ url_for('muncitori') }}" class="btn btn-secondary">Înapoi</a>

</form>

{% endblock %}
