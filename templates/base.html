<!DOCTYPE html>
<html>
<head>
    <title>SmartPontaj</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link 
     href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
     rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="{{ url_for('dashboard') }}">
            SmartPontaj
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}"
                       href="{{ url_for('dashboard') }}">
                       Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'pontaj' %}active{% endif %}"
                       href="{{ url_for('pontaj') }}">
                       Pontaj
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'muncitori' %}active{% endif %}"
                       href="{{ url_for('muncitori') }}">
                       Muncitori
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'raport_lunar' %}active{% endif %}"
                       href="{{ url_for('raport_lunar') }}">
                       Raport Lunar
                    </a>
                </li>

                {% if current_user.is_authenticated and current_user.role == "admin" %}
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'admin' %}active{% endif %}"
                       href="{{ url_for('admin') }}">
                       Admin
                    </a>
                </li>
                {% endif %}

            </ul>

            <span class="navbar-text me-3">
                {{ current_user.username }}
            </span>

            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">
                Logout
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
