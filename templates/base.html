<!DOCTYPE html>
<html lang="ro">

<head>

<meta charset="UTF-8">
<title>SmartPontaj</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f5f7fb;
}

.sidebar{
height:100vh;
background:#1f2d3d;
color:white;
padding:20px;
}

.sidebar a{
color:white;
text-decoration:none;
display:block;
padding:10px;
border-radius:6px;
margin-bottom:5px;
}

.sidebar a:hover{
background:#3b4b5c;
}

.card{
border:none;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-2 sidebar">

<h4>SmartPontaj</h4>

<nav>

<a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
<a href="{{ url_for('pontaj') }}">🕒 Pontaj</a>

{% if current_user.role == "admin" %}

<a href="{{ url_for('muncitori') }}">👷 Muncitori</a>
<a href="{{ url_for('raport_lunar') }}">📅 Raport lunar</a>
<a href="{{ url_for('fluturas') }}">💰 Fluturaș</a>
<a href="{{ url_for('admin') }}">Admin</a>

{% endif %}

<a href="{{ url_for('schimba_parola') }}">Schimbă parola</a>
<a href="{{ url_for('logout') }}">Logout</a>

</nav>

<a href="{{ url_for('logout') }}">Logout</a>

</div>

<div class="col-10 p-4">

{% block content %}
{% endblock %}

</div>

</div>

</div>

</body>
</html>
