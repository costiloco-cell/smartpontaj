{% extends "base.html" %}

{% block content %}

<h2>Dashboard</h2>

<form method="GET">

<label>Luna</label>

<input type="month" name="luna" value="{{ luna }}">

<select name="muncitor">

<option value="">Toți muncitorii</option>

{% for m in muncitori %}

<option value="{{ m.id }}"
{% if muncitor_selectat == m.id %}selected{% endif %}>
{{ m.nume }}
</option>

{% endfor %}

</select>

<button class="btn btn-primary">Filtrează</button>

</form>

<hr>

<h4>Total ore: {{ total_ore }}</h4>
<h4>Total plată: {{ total_plata }} lei</h4>

<h5>Luna anterioară:</h5>

Ore: {{ ore_anterior }} <br>
Plată: {{ plata_anterior }} lei <br>

Diferență: {{ diferenta_proc }} %

<hr>

<canvas id="graficOre"></canvas>

<script>
<div class="row">

<div class="col-md-4">

<div class="card p-3">

<h5>Total ore</h5>
<h2>{{ total_ore }}</h2>

</div>

</div>

<div class="col-md-4">

<div class="card p-3">

<h5>Total plată</h5>
<h2>{{ total_plata }} lei</h2>

</div>

</div>

<div class="col-md-4">

<div class="card p-3">

<h5>Diferență</h5>
<h2>{{ diferenta_proc }} %</h2>

</div>

</div>

</div>
const ctx = document.getElementById('graficOre');

new Chart(ctx, {

type: 'bar',

data: {

labels: {{ zile|tojson }},

datasets: [{
label: 'Ore lucrate',
data: {{ ore_pe_zi|tojson }}
}]

}

});

</script>

{% endblock %}
