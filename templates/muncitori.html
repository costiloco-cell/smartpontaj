{% extends "base.html" %}

{% block content %}

<h2>Muncitori</h2>

<h4>Adaugă muncitor</h4>

<form method="POST" class="mb-3">

<input name="nume" placeholder="Nume muncitor" required>

<input name="tarif" placeholder="Tarif / ora" required>

<button class="btn btn-primary">Adaugă</button>

</form>

<hr>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Nume</th>
<th>Tarif</th>
<th>Acțiuni</th>
</tr>

{% for m in muncitori %}

<tr>

<td>{{ m.id }}</td>

<td>{{ m.nume }}</td>

<td>{{ m.tarif_ora }} lei</td>

<td>

<a href="{{ url_for('edit_muncitor', id=m.id) }}"
class="btn btn-warning btn-sm">
Edit
</a>

<a href="{{ url_for('delete_muncitor', id=m.id) }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Ștergi acest muncitor?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
