{% extends "base.html" %}

{% block content %}

<h2>Admin Panel</h2>

<h3>Creează utilizator</h3>

<form method="POST">

<label>Username</label>
<input name="username" required>

<label>Parolă</label>
<input type="password" name="password" required>

<label>Rol</label>

<select name="role" class="form-control">

<option value="user">User</option>

<option value="manager">Manager</option>

<option value="admin">Admin</option>

</select>
<button class="btn btn-success">Creează</button>

</form>

<hr>

<h3>Utilizatori existenți</h3>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Username</th>
<th>Rol</th>
</tr>

{% for u in users %}

<tr>
<td>{{ u.id }}</td>
<td>{{ u.username }}</td>
<td>{{ u.role }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
